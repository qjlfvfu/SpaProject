{% extends 'base.html' %}

{% block title %}Главная{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="jumbotron">
        <h1 class="display-4">Добро пожаловать в SpaProfile!</h1>
        <p class="lead">Сервис для отслеживания привычек</p>
        <hr class="my-4">
        <p>Начните отслеживать свои привычки уже сегодня.</p>
        {% if user.is_authenticated %}
            <a class="btn btn-primary btn-lg" href="{% url 'habits:habit_list' %}" role="button">Мои привычки</a>
        {% else %}
            <a class="btn btn-primary btn-lg" href="{% url 'users:login' %}" role="button">Войти</a>
            <a class="btn btn-success btn-lg" href="{% url 'users:register' %}" role="button">Регистрация</a>
        {% endif %}
    </div>
</div>
{% endblock %}
