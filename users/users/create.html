{% extends 'users/base.html' %}

{% block title %}Создание аккаунта{% endblock %}

{% block header %}
<div class="container text-center">
    <h1 class="display-4">Регистрация</h1>
</div>
{% endblock %}

{% block content %}
<form>
  <div class="col-sm-3">
    <label  class="form-label">Ф.И.О.</label>
    <input class="form-control" type="text" placeholder="Введите имя" aria-label="default input example">
  </div>
  <div class="col-sm-3">
    <label for="exampleInputEmail1" class="form-label">Ваш Email</label>
    <input type="email" class="form-control" id="exampleInputEmail1" placeholder="Введите Email" aria-describedby="emailHelp">
  </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="autoSizingCheck">
      <label class="form-check-label" for="autoSizingCheck">
        Запомнить меня
      </label>
    </div>
    <div class="col-auto">
    <button type="submit" class="btn btn-primary">Submit</button>
    </div>
</form>
